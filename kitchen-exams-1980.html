// ── HELPERS ───────────────────────────────────────────
function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=b[i];b[i]=b[j];b[j]=t;}return b;}

// Builds the full pool of {dish,sec} pairs for given sections
function buildPool(sections){
  const pool=[];
  sections.forEach(function(sec){(MENU[sec]||[]).forEach(function(dish){pool.push({dish:dish,sec:sec});});});
  return pool;
}

// count: a number, or "all" meaning use the entire pool once (no repeats)
// If a number is requested that's larger than the pool, we repeat shuffled passes
// so every dish appears at least once before any repeats (fair coverage).
function genQs(sections,count){
  const pool=buildPool(sections);
  if(pool.length===0) return [];
  const wantAll = count==="all";
  const want = wantAll ? pool.length : Math.min(Number(count)||pool.length, pool.length*3);
  let result=[];
  while(result.length<want){
    const shuffledPass=shuffle(pool);
    const remaining=want-result.length;
    result=result.concat(shuffledPass.slice(0,Math.min(remaining,shuffledPass.length)));
    if(wantAll) break;
  }
  return result.map(function(q,i){
    // Shuffle the ingredient rows for each question so memorising order won't help
    return Object.assign({},q,{id:i+1, shuffledItems: shuffle(q.dish.items)});
  });
}

// ── SHARED STORAGE HELPERS ─────────────────────────
// Graceful fallbacks so a storage error never blocks the exam from starting.
const _memStore = {}; // in-memory fallback if window.storage unavailable

async function storageGet(key){
  try{
    if(window.storage){
      const r = await window.storage.get(key, true);
      return r ? JSON.parse(r.value) : (_memStore[key]||null);
    }
  }catch(e){}
  return _memStore[key]||null;
}
async function storageSet(key,value){
  _memStore[key] = value; // always update memory first
  try{
    if(window.storage){
      await window.storage.set(key, JSON.stringify(value), true);
    }
  }catch(e){}
  return true;
}
async function storageListKeys(prefix){
  const memKeys = Object.keys(_memStore).filter(function(k){return k.indexOf(prefix)===0;});
  try{
    if(window.storage){
      const r = await window.storage.list(prefix, true);
      const storageKeys = r ? r.keys : [];
      // merge both sources
      const all = Array.from(new Set(memKeys.concat(storageKeys)));
      return all;
    }
  }catch(e){}
  return memKeys;
}
async function storageDelete(key){
  delete _memStore[key];
  try{ if(window.storage) await window.storage.delete(key, true); }catch(e){}
  return true;
}

// ── TIMER ─────────────────────────────────────────────
function Timer({totalSec,onEnd}){
  const [sec,setSec]=useState(totalSec);
  useEffect(function(){
    const t=setInterval(function(){
      setSec(function(s){
        if(s<=1){clearInterval(t);onEnd();return 0;}
        return s-1;
      });
    },1000);
    return function(){clearInterval(t);};
  },[]);
  const pct=sec/totalSec*100;
  const col=pct>50?"#22c55e":pct>20?"#f59e0b":"#ef4444";
  const m=Math.floor(sec/60), s=sec%60;
  return (
    <div>
      <div style={{fontFamily:"monospace",fontSize:22,fontWeight:900,color:col,letterSpacing:2}}>
        {String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}
      </div>
      <div style={{height:4,background:"#222",borderRadius:2,marginTop:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:pct+"%",background:col,transition:"width 1s linear,background .5s",borderRadius:2}}/>
      </div>
    </div>
  );
}

  async function doLogin(){
    const c=codeInput.trim();
    if(!c){return;}
    setLoginBusy(true);setLoginErr("");
    const br=Object.keys(EMERGENCY).find(function(b){return EMERGENCY[b]===c;});
    if(br){
      setChef({name:"كود طوارئ",branch:br,code:"EMERGENCY-"+br});

    setLoginErr("❌ كود غير صحيح");

  }

  function requireAdmin(fn){
    if(adminUnlocked){fn();return;}
    setPendingFn(function(){return fn;});
    setAdminInput("");setAdminErr("");setShowAdmin(true);
  }
  function submitAdmin(){
    if(adminInput.trim()===ADMIN_PASS){
      setAdminUnlocked(true);setShowAdmin(false);
      if(pendingFn){pendingFn();setPendingFn(null);}
    } else { setAdminErr("❌ باسورد خاطئ"); }
  }

  function requestExam(cfg){
    setPendingExam(cfg);setExamCodeInput("");setExamCodeErr("");
    setCustomDur(null);setNoTimeLimit(false);
    setQuestionCountChoice(cfg.count==="all"?"all":20);
    setShowExamCode(true);
  }

  // Check storage for an existing attempt record (one-time-use enforcement)
  async function checkExistingAttempt(code,examId){
    const rec=await storageGet(attemptKey(code,examId));
    return rec; // null if none
  }

  async function launchExam(cfg,dur,qCount,noTimeOverride){
    const code = chef ? chef.code : "UNKNOWN";
    setExamLaunchBusy(true);

    // Enforce one-time-use unless admin already reset it
    const existing = await checkExistingAttempt(code,cfg.id);
    if(existing && existing.status!=="reset_allowed"){
      setExamCodeErr("⚠️ لديك محاولة مسجلة من قبل لهذا الامتحان. لازم المدير يعمل Reset للسماح بمحاولة جديدة.");
      setExamLaunchBusy(false);
      return;
    }

    const useNoTime = noTimeOverride!==undefined ? noTimeOverride : noTimeLimit;
    const finalQuestions = genQs(cfg.sections, qCount);
    const finalDuration = useNoTime ? null : (dur || cfg.defaultDur);
    const startedAtISO = new Date().toISOString();

    setExam(Object.assign({},cfg,{duration:finalDuration,questionCountUsed:qCount,_startedAt:startedAtISO}));
    setQuestions(finalQuestions);
    setCellVals({});setShown({});setDone(false);setShowCert(false);
    setAdminUnlocked(false);
    setCheatFlagged(false);setCheatCount(0);

    // Record "Started" status immediately, locking the code+exam combo
    await storageSet(attemptKey(code,cfg.id),{
      code:code, name:chef?chef.name:"", branch:chef?chef.branch:"",
      examId:cfg.id, examTitle:cfg.titleAr,
      status:"started", startedAt:startedAtISO,
      cheatCount:0, cheatFailed:false,
      score:null, total:finalQuestions.length, percent:null, pass:null,
      duration:finalDuration
    });

    setExamLaunchBusy(false);
    setScreen("exam");
  }

  async function confirmExam(){
    const c=examCodeInput.trim();
    const isEmergency=Object.values(EMERGENCY).indexOf(c)!==-1;
    const isChefCode=!!CHEFS.find(function(x){return x.code===c;});
    const isSameAsLoggedIn=chef && c===chef.code;
    if(isEmergency||isChefCode||isSameAsLoggedIn){
      const dur=customDur!==null?customDur:(pendingExam?pendingExam.defaultDur:20);
      const isSingleSection = pendingExam && pendingExam.sections && pendingExam.sections.length===1;
      const qCount = isSingleSection ? "all" : (pendingExam && pendingExam.count==="all" ? "all" : questionCountChoice);
      setShowExamCode(false);
      try{ await launchExam(pendingExam,dur,qCount); }
      catch(err){ setExamLaunchBusy(false); setScreen("exam"); }
    } else {
      setExamCodeErr("❌ كود غير صحيح");
    }
  }

  // ── FINISH (manual submit or auto via timer/cheat) ─
  async function finish(failedByCheat){
    setDone(true);
    const code = chef ? chef.code : "UNKNOWN";
    const g = gradeAll();
    const pass = failedByCheat ? false : g.percent>=70;
    await storageSet(attemptKey(code,exam.id),{
      code:code, name:chef?chef.name:"", branch:chef?chef.branch:"",
      examId:exam.id, examTitle:exam.titleAr,
      status: failedByCheat ? "failed_cheat" : "completed",
      startedAt:exam._startedAt||new Date().toISOString(),
      finishedAt:new Date().toISOString(),
      cheatCount:cheatCount, cheatFailed: !!failedByCheat,
      score:g.fullyCorrectQuestions, total:questions.length, percent:g.percent, pass:pass,
      duration:exam.duration
    });
    setScreen("result");
  }

  function resetExam(){requireAdmin(function(){
    // Admin manually re-opens this code+exam combo, then relaunches
    const code = chef ? chef.code : "UNKNOWN";
    const wasNoTime = exam.duration==null;
    storageSet(attemptKey(code,exam.id),{status:"reset_allowed"}).then(function(){
      launchExam(exam, exam.duration, exam.questionCountUsed, wasNoTime);
    });
  });}

  // ── ANTI-CHEAT: detect tab switch / minimize during exam ──
  useEffect(function(){
    if(screen!=="exam" || done) return;
    function onVisibilityChange(){
      if(document.hidden){
        setCheatCount(function(prev){
          const next=prev+1;
          setShowCheatWarning(true);
          // Strict: first violation fails the exam immediately
          setCheatFlagged(true);
          return next;
        });
      }
    }
    document.addEventListener("visibilitychange",onVisibilityChange);
    return function(){document.removeEventListener("visibilitychange",onVisibilityChange);};
  },[screen,done]);

  useEffect(function(){

  function ck(qi,r,c){return qi+"-"+r+"-"+c;}
  function cv(qi,r,c){return cellVals[ck(qi,r,c)]||"";}
  function sc(qi,r,c,v){setCellVals(function(p){const n=Object.assign({},p);n[ck(qi,r,c)]=v;return n;});}

  // ── SHARED NORMALISER ─────────────────────────────
  function normQty(s){ return (s||"").toString().trim().toLowerCase().replace(/\s+/g,""); }

  // ── SHARED AUTO-GRADING ────────────────────────────
  // New model: only Qty is entered. ck(qi, r, 0) = qty typed for row r of question qi.
  // items are in q.shuffledItems order (same order shown on screen).
  function gradeAll(){
    const perQ = questions.map(function(q,i){
      const items = q.shuffledItems || q.dish.items;
      let correct=0;
      items.forEach(function(it,r){
        const typed = normQty(cellVals[ck(i,r,0)]);
        const expected = normQty(it.qty);
        if(typed.length>0 && typed===expected) correct++;
      });
      return {correct:correct, total:items.length};
    });
    const ingCorrect = perQ.reduce(function(s,r){return s+r.correct;},0);
    const ingTotal   = perQ.reduce(function(s,r){return s+r.total;},0);
    const percent    = ingTotal>0 ? Math.round(ingCorrect/ingTotal*100) : 0;
    const fullyCorrectQuestions = perQ.filter(function(r){return r.total>0&&r.correct===r.total;}).length;
    return {perQ:perQ, ingCorrect:ingCorrect, ingTotal:ingTotal, percent:percent, fullyCorrectQuestions:fullyCorrectQuestions};
  }

  const answeredCount=questions.filter(function(q,i){
    const items = q.shuffledItems || q.dish.items;
    return items.some(function(_,r){ return normQty(cellVals[ck(i,r,0)]).length>0; });
  }).length;

  // ── DASHBOARD DATA LOADER ──────────────────────────
  async function loadDashboard(){
    setDashboardLoading(true);
    const keys = await storageListKeys("attempt:");
    const records=[];
    for(const k of keys){
      const rec = await storageGet(k);
      if(rec && rec.code) records.push(Object.assign({_key:k},rec));
    }
    records.sort(function(a,b){
      return new Date(b.startedAt||0) - new Date(a.startedAt||0);
    });
    setDashboardData(records);
    setDashboardLoading(false);
  }

          {/* Score summary — auto graded */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
            <div style={{background:"#0f0f1e",borderRadius:10,padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:900,color:"#22c55e"}}>{totalIngredientsCorrect}/{totalIngredientsAll}</div>
              <div style={{fontSize:10,color:"#666"}}>مكونات صحيحة</div>
            </div>
            <div style={{background:"#0f0f1e",borderRadius:10,padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:900,color:overallPass?"#22c55e":"#ef4444"}}>{overallPercent}%</div>
              <div style={{fontSize:10,color:"#666"}}>النسبة الكلية</div>
            </div>
            <div style={{background:"#0f0f1e",borderRadius:10,padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:900,color:overallPass?"#22c55e":"#ef4444"}}>{cheatCount>0?"راسب":(overallPass?"ناجح":"راسب")}</div>
              <div style={{fontSize:10,color:"#666"}}>الحالة (٧٠٪ للنجاح)</div>
            </div>
          </div>

          {/* Detailed error report */}
          <div style={{background:"#0f0f1e",borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{fontSize:12,color:"#888",marginBottom:12,textAlign:"right"}}>تقرير الإجابات — صح / خطأ لكل سؤال</div>
            {questions.map(function(q,i){
              const qsc=perQuestionScores[i];
              const items = q.shuffledItems || q.dish.items;
              const allCorrect = qsc.total>0 && qsc.correct===qsc.total;
              return (
                <div key={i} style={{marginBottom:10,padding:"10px 12px",background:"#0a0a16",borderRadius:9,direction:"rtl",border:"1px solid "+(allCorrect?"#22c55e33":"#ef444433")}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#e2e8f0"}}>{i+1}. {q.dish.nameAr} — {q.dish.name}</div>
                    <div style={{fontSize:11,fontWeight:800,color:allCorrect?"#22c55e":"#ef4444"}}>{qsc.correct}/{qsc.total} {allCorrect?"✅":"❌"}</div>
                  </div>
                  {/* Per-row breakdown always shown in result screen */}
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead>
                      <tr style={{background:"rgba(255,255,255,.03)"}}>
                        <th style={{padding:"4px 8px",textAlign:"right",color:"#666",fontWeight:500}}>المكون</th>
                        <th style={{padding:"4px 6px",textAlign:"center",color:"#666",fontWeight:500}}>الوحدة</th>
                        <th style={{padding:"4px 6px",textAlign:"center",color:"#666",fontWeight:500}}>إجابتك</th>
                        <th style={{padding:"4px 6px",textAlign:"center",color:"#666",fontWeight:500}}>الصح</th>
                        <th style={{padding:"4px 4px",textAlign:"center",color:"#666",fontWeight:500}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {items.map(function(it,r){
                        const typed = normQty(cellVals[ck(i,r,0)]);
                        const expected = normQty(it.qty);
                        const ok = typed.length>0 && typed===expected;
                        const empty = typed.length===0;
                        return (
                          <tr key={r} style={{background:ok?"rgba(34,197,94,.06)":empty?"transparent":"rgba(239,68,68,.05)"}}>
                            <td style={{padding:"4px 8px",color:"#e2e8f0",direction:"rtl"}}>{it.item}</td>
                            <td style={{padding:"4px 6px",color:"#fbbf24",textAlign:"center"}}>{it.unit||"—"}</td>
                            <td style={{padding:"4px 6px",textAlign:"center",fontWeight:700,color:ok?"#22c55e":empty?"#555":"#ef4444"}}>{typed||"—"}</td>
                            <td style={{padding:"4px 6px",textAlign:"center",color:"#22c55e",fontWeight:700}}>{it.qty}</td>
                            <td style={{padding:"4px 4px",textAlign:"center"}}>{ok?"✅":empty?"⬜":"❌"}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              );
            })}
          </div>

          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <button onClick={function(){setShowCert(true);}} disabled={!overallPass} style={{flex:1,background:overallPass?"#e94560":"#333",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontSize:13,fontWeight:800,cursor:overallPass?"pointer":"not-allowed",opacity:overallPass?1:0.5}}>📜 الشهادة{!overallPass?" (يلزم ٧٠٪)":""}</button>
            <button onClick={resetExam} style={{flex:1,background:"#0f2a1a",color:"#22c55e",border:"1px solid #22c55e33",borderRadius:10,padding:"12px",fontSize:13,fontWeight:800,cursor:"pointer"}}>🔒 إعادة</button>
            <button onClick={function(){setScreen("home");}} style={{flex:1,background:"#1a1a2e",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontSize:13,fontWeight:800,cursor:"pointer"}}>القائمة</button>
          </div>
        </div>
      </div>
    );
  }

  // EXAM
  return (
    <div style={{minHeight:"100vh",background:"#080810",color:"#fff",fontFamily:"Arial"}}>
      {showAdmin && <AdminModal/>}
      {showCheatWarning && <CheatWarningModal/>}
      <div style={{position:"sticky",top:0,zIndex:99,background:"rgba(8,8,16,.97)",backdropFilter:"blur(10px)",borderBottom:"1px solid #1a1a2e",padding:"8px 16px"}}>
        <div style={{maxWidth:700,margin:"0 auto",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:800}}>{exam?exam.titleAr:""}</div>
            <div style={{fontSize:10,color:"#444"}}>{chef?chef.name:""} &nbsp;•&nbsp; {answeredCount}/{questions.length}</div>
          </div>
          <div style={{minWidth:110}}>
            {exam && exam.duration==null
              ? <div style={{color:"#22c55e",fontWeight:700,fontSize:12}}>∞ بدون وقت</div>
              : !done
                ? <Timer totalSec={(exam?exam.duration:20)*60} onEnd={function(){finish(false);}}/>
                : <div style={{color:"#ef4444",fontWeight:700,fontSize:12}}>⏰ انتهى الوقت</div>}
          </div>
          <button onClick={function(){setScreen("home");}} style={{background:"transparent",color:"#444",border:"1px solid #1a1a2e",borderRadius:7,padding:"5px 10px",fontSize:10,cursor:"pointer"}}>← خروج</button>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"14px 14px"}}>
        {done && <div style={{background:"rgba(239,68,68,.1)",border:"1px solid #ef4444",borderRadius:10,padding:12,marginBottom:14,textAlign:"center",color:"#ef4444",fontWeight:700}}>⏰ انتهى وقت الامتحان!</div>}

        {questions.map(function(q,i){
          const items = q.shuffledItems || q.dish.items;
          const isShown = !!shown[i];
          return (
            <div key={i} style={{background:"#0f0f1e",border:"1px solid #1e1e3e",borderRadius:12,padding:14,marginBottom:14}}>
              {/* Header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{background:exam?exam.accent:"#e94560",color:"#fff",borderRadius:6,padding:"2px 10px",fontSize:12,fontWeight:800}}>{i+1}/{questions.length}</span>
                <span style={{fontSize:10,color:"#444",background:"#111",borderRadius:5,padding:"2px 7px"}}>{q.sec}</span>
              </div>

              {/* Order name */}
              <div style={{background:"#0a0a16",borderRadius:8,padding:"9px 13px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,color:"#444"}}>Order /</div>
                  <div style={{fontSize:15,fontWeight:900,color:"#fff"}}>{q.dish.name}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:10,color:"#444"}}>الأوردر /</div>
                  <div style={{fontSize:14,fontWeight:700,color:exam?exam.accent:"#e94560"}}>{q.dish.nameAr}</div>
                </div>
              </div>

              {/* Table: Item (fixed) | Unit (fixed) | Qty (input only) */}
              <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:280}}>
                  <thead>
                    <tr style={{background:"#1a1a2e"}}>
                      <th style={{padding:"7px 10px",border:"1px solid #2a2a4e",color:"#aaa",fontSize:11,fontWeight:600,width:"52%",textAlign:"right"}}>المكون — Item</th>
                      <th style={{padding:"7px 8px",border:"1px solid #2a2a4e",color:"#aaa",fontSize:11,fontWeight:600,width:"18%",textAlign:"center"}}>الوحدة</th>
                      <th style={{padding:"7px 8px",border:"1px solid #2a2a4e",color:"#aaa",fontSize:11,fontWeight:600,width:"30%",textAlign:"center"}}>الكمية ✏️</th>
                    </tr>
                  </thead>
                  <tbody>
                    {items.map(function(it,r){
                      const userQty = (cellVals[ck(i,r,0)]||"").trim();
                      // After reveal: compare user input against correct qty (normalised)
                      const normStr = function(s){ return (s||"").toString().trim().toLowerCase().replace(/\s+/g,""); };
                      const isCorrectRow = isShown && normStr(userQty)===normStr(it.qty);
                      const isWrongRow   = isShown && userQty.length>0 && !isCorrectRow;
                      const rowBg = isCorrectRow
                        ? "rgba(34,197,94,.10)"
                        : isWrongRow
                        ? "rgba(239,68,68,.08)"
                        : "transparent";
                      return (
                        <tr key={r} style={{background:rowBg}}>
                          {/* Item — fixed text */}
                          <td style={{border:"1px solid #1e1e3e",padding:"7px 10px",color:"#e2e8f0",fontSize:13,direction:"rtl",textAlign:"right"}}>
                            {it.item}
                          </td>
                          {/* Unit — fixed text */}
                          <td style={{border:"1px solid #1e1e3e",padding:"7px 6px",color:"#fbbf24",fontSize:12,textAlign:"center"}}>
                            {it.unit||"—"}
                          </td>
                          {/* Qty — input (number only) + correct answer reveal */}
                          <td style={{border:"1px solid #1e1e3e",padding:0,textAlign:"center",position:"relative"}}>
                            <input
                              value={userQty}
                              onChange={function(e){sc(i,r,0,e.target.value);}}
                              disabled={done}
                              type="text"
                              inputMode="decimal"
                              placeholder="?"
                              style={{
                                width:"100%",background:"transparent",border:"none",outline:"none",
                                color: isCorrectRow?"#22c55e": isWrongRow?"#ef4444":"#e2e8f0",
                                fontSize:14,padding:"7px 6px",fontFamily:"Arial",
                                boxSizing:"border-box",textAlign:"center",fontWeight:700,
                              }}
                            />
                            {/* Show correct answer below wrong answer after reveal */}
                            {isWrongRow && (
                              <div style={{fontSize:10,color:"#22c55e",paddingBottom:4}}>✓ {it.qty}</div>
                            )}
                            {isShown && userQty.length===0 && (
                              <div style={{fontSize:10,color:"#888",paddingBottom:4}}>{it.qty}</div>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              {/* Show answer btn */}
              {!isShown
                ? <button onClick={function(){requireAdmin(function(){setShown(function(s){const n=Object.assign({},s);n[i]=true;return n;});});}}
                    style={{marginTop:8,background:"transparent",border:"1px solid #e94560",color:"#e94560",borderRadius:7,padding:"7px 14px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                    🔒 اظهر الإجابة
                  </button>
                : <div style={{marginTop:6,display:"flex",gap:12,fontSize:11}}>
                    <span style={{color:"#22c55e"}}>✅ صح: {items.filter(function(_,r){return normQty(cellVals[ck(i,r,0)])===normQty(items[r].qty);}).length}</span>
                    <span style={{color:"#ef4444"}}>❌ غلط: {items.filter(function(_,r){const u=normQty(cellVals[ck(i,r,0)]);return u.length>0&&u!==normQty(items[r].qty);}).length}</span>
                    <span style={{color:"#888"}}>— فاضي: {items.filter(function(_,r){return !normQty(cellVals[ck(i,r,0)]);}).length}</span>
                  </div>}
            </div>
          );
        })}

        <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:20,flexWrap:"wrap"}}>
          <button onClick={function(){requireAdmin(function(){
            const all={};
            questions.forEach(function(_,i){all[i]=true;});
            setShown(all);
          });}}
            style={{background:"#f59e0b",color:"#000",border:"none",borderRadius:10,padding:"11px 20px",fontSize:13,fontWeight:800,cursor:"pointer"}}>
            🔒 اظهر كل الإجابات
          </button>
          <button onClick={function(){finish(false);}} style={{background:"#22c55e",color:"#fff",border:"none",borderRadius:10,padding:"11px 20px",fontSize:13,fontWeight:800,cursor:"pointer"}}>
            إنهاء الامتحان — Submit Exam ✓
          </button>
        </div>
        <div style={{height:40}}/>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
